<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深渊呼吸 - 调试版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #0f0; font-family: monospace; overflow: auto; }
        #console {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 30%;
            background: rgba(0, 0, 0, 0.95);
            color: #0f0;
            padding: 10px;
            font-size: 12px;
            overflow-y: auto;
            border-bottom: 2px solid #0f0;
            z-index: 9999;
        }
        #game-frame {
            position: fixed;
            top: 30%;
            left: 0;
            width: 100%;
            height: 70%;
            border: none;
        }
        .log { margin: 2px 0; }
        .error { color: #f00; }
        .success { color: #0f0; }
        .info { color: #0ff; }
    </style>
</head>
<body>
    <div id="console">
        <div class="log success">🎮 深渊呼吸 - 调试模式</div>
        <div class="log info">控制台输出：</div>
    </div>
    <iframe id="game-frame" src="index.html"></iframe>
    
    <script>
        const consoleDiv = document.getElementById('console');
        const gameFrame = document.getElementById('game-frame');
        
        function log(msg, type = 'log') {
            const time = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : (type === 'info' ? 'info' : 'success');
            consoleDiv.innerHTML += `<div class="log ${className}">[${time}] ${msg}</div>`;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }
        
        // 捕获iframe的console
        window.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'console') {
                log(e.data.message, e.data.level);
            }
        });
        
        // 监听iframe加载
        gameFrame.onload = () => {
            log('✓ 游戏页面加载完成', 'success');
            
            // 注入console捕获
            try {
                const iframeWindow = gameFrame.contentWindow;
                const originalLog = iframeWindow.console.log;
                const originalError = iframeWindow.console.error;
                
                iframeWindow.console.log = function(...args) {
                    window.parent.postMessage({
                        type: 'console',
                        level: 'log',
                        message: args.join(' ')
                    }, '*');
                    originalLog.apply(iframeWindow.console, args);
                };
                
                iframeWindow.console.error = function(...args) {
                    window.parent.postMessage({
                        type: 'console',
                        level: 'error',
                        message: args.join(' ')
                    }, '*');
                    originalError.apply(iframeWindow.console, args);
                };
                
                log('✓ Console捕获已注入', 'info');
            } catch (e) {
                log('✗ 无法注入console捕获: ' + e.message, 'error');
            }
        };
        
        log('正在加载游戏...', 'info');
    </script>
</body>
</html>
